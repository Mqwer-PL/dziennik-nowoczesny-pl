<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dziennik 3.0</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        :root {
            --main-bg: #ffffff;
            --text-black: #000000;
            --text-gray: #666666;
            --accent-red: #ff0000;
            --admin-yellow: #ffcc00;
            --border-light: #e0e0e0;
        }

        body { font-family: 'Arial', sans-serif; margin: 0; padding: 0; background: var(--main-bg); color: var(--text-black); }
        header { padding: 10px 20px; border-bottom: 1px solid var(--border-light); }
        .journal-name { font-size: 32px; font-weight: bold; text-align: center; text-transform: uppercase; margin-bottom: 5px; }
        
        .top-bar { display: flex; justify-content: space-between; font-size: 13px; border-bottom: 1px solid var(--border-light); padding: 5px 20px; background: #f9f9f9; }
        .auth-status span { cursor: pointer; text-decoration: underline; color: blue; }

        nav { display: flex; align-items: center; padding: 0 20px; background: #fff; border-bottom: 2px solid #000; position: sticky; top: 0; z-index: 1000; }
        .nav-list { display: flex; list-style: none; margin: 0; padding: 0; }
        .nav-item { position: relative; padding: 15px 20px; cursor: pointer; font-weight: bold; text-transform: uppercase; }
        .nav-item:hover { background: #f0f0f0; }
        
        .admin-tools-btn { color: var(--accent-red); border-left: 1px solid var(--border-light); display: none; }

        .container { max-width: 1200px; margin: 20px auto; padding: 0 20px; display: flex; gap: 20px; }
        .main-content { flex: 3; }
        .sidebar { flex: 1; }

        /* Artykuły na głównej */
        .article-card { display: flex; gap: 15px; padding: 15px 0; border-bottom: 1px solid var(--border-light); cursor: pointer; }
        .article-card .cat { color: var(--accent-red); font-weight: bold; font-size: 12px; text-transform: uppercase; }
        .article-card h2 { margin: 5px 0; font-size: 24px; color: #000; }
        .article-card p { color: var(--text-gray); margin: 0; font-size: 16px; }
        .article-card .thumb { width: 150px; height: 100px; object-fit: cover; background: #eee; }

        /* Modal Logowania/Rejestracji */
        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); }
        .modal-content { background: #fff; width: 320px; margin: 15% auto; padding: 25px; border-radius: 8px; text-align: center; }
        .modal-content h2 { margin-top: 0; }
        .modal-content input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ccc; box-sizing: border-box; }
        .modal-content button { width: 100%; padding: 12px; background: #000; color: #fff; border: none; cursor: pointer; font-weight: bold; margin-top: 10px; }
        .modal-footer { margin-top: 15px; font-size: 13px; }
        .modal-footer span { color: blue; cursor: pointer; text-decoration: underline; }

        /* Panel Admina */
        .admin-panel { display: none; background: #fff; padding: 20px; border: 1px solid #000; }
        .admin-nav { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 1px solid #ccc; padding-bottom: 10px; }
        .admin-nav-item { cursor: pointer; padding: 5px 10px; background: #eee; border-radius: 3px; font-size: 12px; }
        .admin-nav-item.active { background: #000; color: #fff; }

        .editor-section input, .editor-section select { display: block; width: 100%; margin-bottom: 10px; padding: 8px; }
        .block-controls { background: #f0f0f0; padding: 10px; margin: 10px 0; }
        .text-area { width: 100%; min-height: 100px; border: 1px solid #ccc; padding: 10px; margin-top: 5px; }

        .banner-box { width: 100%; height: 250px; background: #eee; border: 1px solid #ccc; display: flex; align-items: center; justify-content: center; overflow: hidden; margin-bottom: 20px; }
        .banner-box img { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body>

<header>
    <div class="journal-name">Dziennik Nowoczesny</div>
    <div class="top-bar">
        <div id="datetime">--.--.---- | --:--:--</div>
        <div class="auth-status" id="authBox">
            Gość | <span onclick="toggleModal('login')">Zaloguj się</span>
        </div>
    </div>
</header>

<nav>
    <ul class="nav-list" id="mainNav">
        <li class="nav-item" onclick="showView('home')">Strona Główna</li>
        <li class="nav-item admin-tools-btn" id="adminLink" onclick="showView('admin')">🔧 NARZĘDZIA EDYCJI</li>
    </ul>
</nav>

<div class="container">
    <div class="main-content" id="viewContainer">
        <div id="homeView">
            <div id="articlesList"></div>
        </div>

        <div id="adminView" class="admin-panel">
            <button onclick="showView('home')" style="margin-bottom:15px;">← Wróć</button>
            <div class="admin-nav">
                <div class="admin-nav-item active" onclick="switchTab('art')">Edycja Artykułów</div>
                <div class="admin-nav-item" onclick="switchTab('tab')">Tabela Ekstraklasy</div>
                <div class="admin-nav-item" onclick="switchTab('rang')">Nadaj rangę</div>
                <div class="admin-nav-item" onclick="switchTab('stats')">Statystyki</div>
                <div class="admin-nav-item" onclick="switchTab('other')">Inne</div>
            </div>
            <div id="adminContent">
                <div class="editor-section">
                    <input type="text" id="artTitle" placeholder="Tytuł artykułu (Największy)">
                    <input type="text" id="artSub" placeholder="Podtytuł (Szary)">
                    <input type="text" id="artMini" placeholder="Link do miniaturki (z prawej)">
                    <div id="editorBlocks"></div>
                    <div class="block-controls">
                        <button onclick="addBlock('text')">+ Dodaj Tekst</button>
                        <button onclick="addBlock('img')">+ Dodaj Zdjęcie</button>
                    </div>
                    <button onclick="publishArticle()" style="background:green; color:white; padding:15px; border:none; width:100%; cursor:pointer;">OPUBLIKUJ</button>
                </div>
            </div>
        </div>
    </div>

    <aside class="sidebar">
        <div class="banner-box" id="sidebarBanner">
            <span>REKLAMA / BANER</span>
        </div>
        <div id="leagueTableSide">
            </div>
    </aside>
</div>

<div id="authModal" class="modal">
    <div class="modal-content">
        <h2 id="modalTitle">Logowanie</h2>
        <input type="text" id="uLogin" placeholder="Nazwa użytkownika">
        <input type="password" id="uPass" placeholder="Hasło">
        <button id="mainAuthBtn" onclick="handleAuth()">Wejdź</button>
        <div class="modal-footer" id="modalSwitchArea">
            Nie masz konta? <span onclick="toggleModal('reg')">Zarejestruj się</span>
        </div>
    </div>
</div>

<script>
    // --- KONFIGURACJA FIREBASE ---
    const firebaseConfig = {
        apiKey: "TWOJE_API_KEY",
        authDomain: "TWOJA_DOMENA.firebaseapp.com",
        databaseURL: "TWOJA_ADRES_BAZY.firebaseio.com",
        projectId: "TWOJE_ID",
        storageBucket: "TWOJE_BUCKET",
        messagingSenderId: "ID",
        appId: "APP_ID"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();

    let currentMode = 'login';
    let userRole = 'guest';

    // --- ZEGAR ---
    setInterval(() => {
        const now = new Date();
        document.getElementById('datetime').innerText = now.toLocaleString('pl-PL');
    }, 1000);

    // --- LOGOWANIE I REJESTRACJA ---
    function toggleModal(mode) {
        currentMode = mode;
        const modal = document.getElementById('authModal');
        const title = document.getElementById('modalTitle');
        const btn = document.getElementById('mainAuthBtn');
        const footer = document.getElementById('modalSwitchArea');

        modal.style.display = 'block';
        if (mode === 'login') {
            title.innerText = 'Logowanie';
            btn.innerText = 'Wejdź';
            footer.innerHTML = 'Nie masz konta? <span onclick="toggleModal(\'reg\')">Zarejestruj się</span>';
        } else {
            title.innerText = 'Rejestracja';
            btn.innerText = 'Zarejestruj';
            footer.innerHTML = 'Masz już konto? <span onclick="toggleModal(\'login\')">Zaloguj się</span>';
        }
    }

    function handleAuth() {
        const user = document.getElementById('uLogin').value;
        const pass = document.getElementById('uPass').value;
        const email = user + "@dziennik.pl"; // Systemowy e-mail na bazie nicku

        if (currentMode === 'reg') {
            auth.createUserWithEmailAndPassword(email, pass)
                .then((res) => {
                    db.ref('users/' + res.user.uid).set({ username: user, role: 'admin' }); // Pierwszy użytkownik dostaje admina
                    location.reload();
                }).catch(err => alert("Błąd rejestracji: " + err.message));
        } else {
            auth.signInWithEmailAndPassword(email, pass)
                .then(() => location.reload())
                .catch(err => alert("Błąd logowania: " + err.message));
        }
    }

    // --- MONITOROWANIE STANU UŻYTKOWNIKA ---
    auth.onAuthStateChanged(user => {
        if (user) {
            db.ref('users/' + user.uid).once('value', snapshot => {
                const data = snapshot.val();
                document.getElementById('authBox').innerHTML = `${data.username} | <span onclick="auth.signOut().then(()=>location.reload())">Wyloguj się</span>`;
                if (data.role === 'admin' || data.role === 'mod') {
                    document.getElementById('adminLink').style.display = 'block';
                }
            });
        }
    });

    // --- NAWIGACJA WIDOKÓW ---
    function showView(view) {
        document.getElementById('homeView').style.display = view === 'home' ? 'block' : 'none';
        document.getElementById('adminView').style.display = view === 'admin' ? 'block' : 'none';
    }

    // --- EDYTOR ARTYKUŁÓW ---
    function addBlock(type) {
        const container = document.getElementById('editorBlocks');
        const div = document.createElement('div');
        div.style.border = "1px dashed #ccc";
        div.style.padding = "10px";
        div.style.marginBottom = "10px";

        if (type === 'text') {
            div.innerHTML = `<textarea class="text-area" placeholder="Treść tekstu..."></textarea>`;
        } else {
            div.innerHTML = `<input type="text" placeholder="Link do zdjęcia (URL)">`;
        }
        container.appendChild(div);
    }

    // Dodaj pierwszy blok na start
    addBlock('text');

    function publishArticle() {
        const title = document.getElementById('artTitle').value;
        const sub = document.getElementById('artSub').value;
        const mini = document.getElementById('artMini').value;
        
        // Zbieranie danych z bloków
        const blocks = [];
        document.getElementById('editorBlocks').childNodes.forEach(node => {
            const txt = node.querySelector('textarea');
            const img = node.querySelector('input');
            if(txt) blocks.push({type: 'text', val: txt.value});
            if(img) blocks.push({type: 'img', val: img.value});
        });

        db.ref('articles').push({
            title, sub, mini, blocks, date: Date.now()
        }).then(() => {
            alert("Opublikowano!");
            showView('home');
        });
    }

    // Zamknięcie modala po kliknięciu poza nim
    window.onclick = function(event) {
        const modal = document.getElementById('authModal');
        if (event.target == modal) modal.style.display = "none";
    }
</script>

</body>
</html>
