<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DZIENNIK-NOWOCZESNY.PL | V2.9.7 KOMPLETNA</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-storage.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=UnifrakturMaguntia&family=Playfair+Display:wght@700;900&family=EB+Garamond:ital,wght@0,400;0,700;1,400&family=Roboto+Slab&family=Montserrat:wght@400;700&family=Oswald&family=Lora&family=Open+Sans&display=swap" rel="stylesheet">
    <style>
        :root { --black: #000; --white: #fff; --red-zone: #ffcccc; --win: #28a745; --draw: #6c757d; --loss: #dc3545; }
        body { font-family: 'EB Garamond', serif; margin: 0; background: var(--white); color: var(--black); }
        
        /* Top Bar & Auth */
        .top-bar { background: #000; color: #fff; padding: 10px 5%; font-size: 12px; display: flex; justify-content: space-between; font-family: Montserrat; }
        .eye-icon { cursor: pointer; margin-left: -30px; position: relative; z-index: 10; color: #000; }

        /* Header */
        header { border-bottom: 8px double #000; padding: 40px; text-align: center; }
        .logo { font-size: 60px; font-weight: 900; text-transform: uppercase; text-decoration: none; color: #000; font-family: 'Playfair Display'; }
        
        /* Layout */
        .container { max-width: 1550px; margin: 20px auto; padding: 0 20px; display: grid; grid-template-columns: 1fr 380px; gap: 40px; }
        .page { display: none; } .active { display: block; }

        /* Edytor Drabinkowy */
        .block-container { border: 2px solid #000; padding: 20px; margin-bottom: 15px; background: #fdfdfd; position: relative; }
        .rich-toolbar { display: flex; gap: 8px; flex-wrap: wrap; background: #eee; padding: 10px; border: 1px solid #000; margin-bottom: 10px; }
        .rich-toolbar button, .rich-toolbar select { padding: 5px; cursor: pointer; font-weight: bold; }
        .editable-area { min-height: 150px; border: 1px inset #ccc; background: #fff; padding: 15px; outline: none; font-size: 18px; }
        
        /* Tabela Ekstraklasy */
        .table-scroll { overflow-x: auto; border: 2px solid #000; margin-top: 15px; }
        table.league-table { width: 100%; border-collapse: collapse; min-width: 900px; font-family: Arial; font-size: 13px; }
        table.league-table th, table.league-table td { border: 1px solid #ddd; padding: 10px; text-align: center; }
        table.league-table tr.relegation { background: var(--red-zone); }
        .form-dot { height: 12px; width: 12px; border-radius: 50%; display: inline-block; margin: 0 2px; border: 1px solid #333; }
        .move-btn { cursor: pointer; font-size: 16px; border: none; background: none; }

        /* Admin Tabs */
        .tabs { display: flex; border-bottom: 3px solid #000; margin-bottom: 20px; }
        .tab-link { padding: 15px; cursor: pointer; font-weight: bold; text-transform: uppercase; border: 1px solid #000; border-bottom: none; margin-right: 5px; }
        .tab-link.active { background: #000; color: #fff; }
    </style>
</head>
<body>

<div class="top-bar">
    <div id="user-info">Gość | <span onclick="showPage('auth')" style="text-decoration:underline; cursor:pointer;">Zaloguj / Zarejestruj</span></div>
    <div id="live-clock"></div>
</div>

<header><a href="#" class="logo" onclick="location.reload()">Dziennik-Nowoczesny.pl</a></header>

<div class="container">
    <main>
        <div id="page-home" class="page active">
            <h1 style="border-bottom: 5px solid #000; font-family: 'Playfair Display';">WIADOMOŚCI DNIA</h1>
            <div id="news-container"></div>
        </div>

        <div id="page-auth" class="page">
            <div style="max-width:400px; margin:auto; border:3px solid #000; padding:30px; box-shadow:10px 10px 0 #000;">
                <h2 style="text-align:center">PANEL DOSTĘPU</h2>
                <input type="text" id="log-n" placeholder="Login" style="width:100%; padding:10px; margin-bottom:10px; border:2px solid #000;">
                <div style="display:flex; align-items:center;">
                    <input type="password" id="log-p" placeholder="Hasło" style="width:100%; padding:10px; margin-bottom:10px; border:2px solid #000;">
                    <span class="eye-icon" onclick="togglePass()">👁️</span>
                </div>
                <button onclick="handleAuth('login')" style="width:100%; background:#000; color:#fff; padding:15px; border:none; font-weight:bold; cursor:pointer;">ZALOGUJ SIĘ</button>
                <button onclick="handleAuth('register')" style="width:100%; background:#fff; color:#000; border:2px solid #000; padding:10px; margin-top:10px; cursor:pointer;">ZAREJESTRUJ SIĘ</button>
            </div>
        </div>

        <div id="page-admin" class="page">
            <div class="tabs">
                <div class="tab-link active" onclick="openAdmin('editor')">Edytor</div>
                <div class="tab-link" onclick="openAdmin('cats')">Kategorie</div>
                <div class="tab-link" onclick="openAdmin('table-edit')">Ekstraklasa</div>
                <div class="tab-link" onclick="openAdmin('users-list')">Użytkownicy / Mecenasi</div>
            </div>

            <div id="admin-editor" class="adm-section">
                <input type="text" id="p-title" placeholder="TU WPISZ TYTUŁ ARTYKUŁU..." style="width:100%; font-size:25px; padding:15px; border:3px solid #000; margin-bottom:20px;">
                <div id="article-builder"></div>
                <button onclick="addBlock('text')">+ DODAJ BLOK TEKSTU</button>
                <button onclick="addBlock('image')">+ DODAJ BLOK ZDJĘCIA</button>
                <button onclick="saveArticle()" style="float:right; background:red; color:#fff; padding:20px; font-weight:bold;">PUBLIKUJ</button>
            </div>
        </div>
    </main>

    <aside>
        <h3>TABELA EKSTRAKLASY</h3>
        <div class="table-scroll">
            <table class="league-table" id="main-league-table">
                </table>
        </div>
        <br>
        <h3>NASI MECENASI</h3>
        <div id="patrons-box" style="border:1px solid #000; padding:10px;"></div>
    </aside>
</div>

<script>
    // Konfiguracja Firebase
    const firebaseConfig = {
        apiKey: "AIzaSyCDfjooU0nPnOGePvzAk5gDziltwlqOSog",
        databaseURL: "https://grapanstwamiasta-default-rtdb.firebaseio.com",
        projectId: "grapanstwamiasta",
        storageBucket: "grapanstwamiasta.appspot.com",
        appId: "1:397606766316:web:2c038abc12914fbbe345c9"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function togglePass() {
        const p = document.getElementById('log-p');
        p.type = p.type === 'password' ? 'text' : 'password';
    }

    function addBlock(type) {
        const id = Date.now();
        const container = document.getElementById('article-builder');
        let html = '';
        
        if(type === 'text') {
            html = `
                <div class="block-container" id="b-${id}">
                    <div class="rich-toolbar">
                        <button onclick="cmd('bold')">B</button><button onclick="cmd('italic')">I</button><button onclick="cmd('underline')">U</button>
                        <select onchange="cmd('fontName', this.value)">
                            <option value="EB Garamond">Garamond</option><option value="UnifrakturMaguntia">Gotyk</option><option value="Playfair Display">Modern</option><option value="Oswald">Oswald</option>
                        </select>
                        <input type="color" onchange="cmd('foreColor', this.value)" title="Kolor tekstu">
                        <input type="color" onchange="cmd('hiliteColor', this.value)" title="Kolor tła">
                        <button onclick="removeB(${id})" style="background:red; color:#fff; margin-left:auto;">USUŃ</button>
                    </div>
                    <div class="editable-area" contenteditable="true" id="edit-${id}">Wpisz tekst tutaj...</div>
                </div>`;
        } else {
            html = `
                <div class="block-container" id="b-${id}">
                    <strong>ZDJĘCIE:</strong><br>
                    <input type="text" id="url-${id}" placeholder="Link do zdjęcia" style="width:70%"> LUB 
                    <input type="file" onchange="handleFile(${id})" style="width:20%">
                    <button onclick="removeB(${id})" style="background:red; color:#fff; float:right;">USUŃ</button>
                </div>`;
        }
        container.insertAdjacentHTML('beforeend', html);
    }

    function cmd(c, v=null) { document.execCommand(c, false, v); }
    function removeB(id) { document.getElementById('b-'+id).remove(); }
    function showPage(p) { document.querySelectorAll('.page').forEach(x => x.classList.remove('active')); document.getElementById('page-'+p).classList.add('active'); }

    // Start
    setInterval(() => { document.getElementById('live-clock').innerText = new Date().toLocaleString('pl-PL'); }, 1000);
</script>
</body>
</html>
