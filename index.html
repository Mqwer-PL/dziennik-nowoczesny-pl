<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DZIENNIK-NOWOCZESNY.PL | V2.9.2 ULTRA</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-storage.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=UnifrakturMaguntia&family=Playfair+Display:wght@700&family=EB+Garamond&family=Roboto+Slab:wght@900&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --black: #000; --white: #fff; --grey: #f0f0f0; }
        body { font-family: 'EB Garamond', serif; margin: 0; background: var(--white); color: var(--black); }
        
        /* NAWIGACJA */
        nav { border-bottom: 3px solid #000; background: #fff; position: sticky; top: 0; z-index: 1000; display: flex; justify-content: center; }
        .nav-link { padding: 15px 20px; display: block; text-decoration: none; color: #000; font-family: Arial; font-size: 12px; font-weight: bold; text-transform: uppercase; cursor: pointer; }
        .nav-item:hover { background: #eee; }

        header { border-bottom: 8px double #000; padding: 30px; text-align: center; }
        .logo { font-size: 50px; font-weight: 900; text-transform: uppercase; text-decoration: none; color: #000; font-family: 'Playfair Display', serif; }

        .container { max-width: 1300px; margin: 20px auto; padding: 0 20px; display: grid; grid-template-columns: 1fr 350px; gap: 40px; }
        .no-sidebar { grid-template-columns: 1fr; }
        .page { display: none; } .active { display: block; }

        /* ARTYKUŁ - STYL PROFESJONALNY */
        .article-view { max-width: 750px; margin: 0 auto; line-height: 1.7; }
        .block-text { padding: 15px; margin: 10px 0; border-radius: 2px; white-space: pre-wrap; font-size: 21px; }
        .block-img { width: 100%; height: auto; margin: 25px 0; border: 1px solid #000; }

        /* ADMIN BOXES */
        .admin-card { border: 3px solid #000; padding: 25px; margin-bottom: 30px; background: #fff; box-shadow: 8px 8px 0px #000; }
        .editor-block { border: 1px dashed #666; padding: 15px; margin: 15px 0; background: #fafafa; position: relative; }
        .btn-remove { position: absolute; top: 10px; right: 10px; background: #000; color: #fff; border: none; cursor: pointer; padding: 5px 10px; }

        /* KOLORY DLA WYBORU */
        .c-black { background: #000; color: #fff; } .c-white { background: #fff; color: #000; }
        .c-red { background: #ff0000; } .c-green { background: #008000; }
        .c-blue { background: #0000ff; } .c-yellow { background: #ffff00; }
    </style>
</head>
<body>

<div style="background:#000; color:#fff; padding:10px 5%; font-size:12px; display:flex; justify-content:space-between;">
    <div id="auth-info">Gość | <span onclick="showPage('page-auth')" style="text-decoration:underline; cursor:pointer;">Zaloguj</span></div>
    <div id="live-clock"></div>
</div>

<header><a href="#" class="logo" onclick="location.reload()">Dziennik-Nowoczesny.pl</a></header>
<nav id="top-nav"></nav>

<div class="container" id="layout-grid">
    <main>
        <div id="page-list" class="page active">
            <h1 id="title-main" style="border-bottom: 5px solid #000; padding-bottom: 10px; font-family: 'Playfair Display';">Strona Główna</h1>
            <div id="news-feed"></div>
        </div>

        <div id="page-read" class="page">
            <div id="article-body" class="article-view"></div>
        </div>

        <div id="page-admin" class="page">
            <div class="admin-card">
                <h2>KREATOR ARTYKUŁU</h2>
                <input type="text" id="p-title" placeholder="NAGŁÓWEK" style="width:100%; font-size:24px; font-weight:bold; padding:10px;">
                <input type="text" id="p-sub" placeholder="Podtytuł (krótki opis)" style="width:100%; margin:10px 0; padding:10px;">
                
                <div id="article-builder"></div>
                
                <div style="background:#000; padding:15px; margin-top:20px;">
                    <button onclick="addBlock('text')" style="cursor:pointer; padding:10px;">+ DODAJ TEKST</button>
                    <button onclick="addBlock('img')" style="cursor:pointer; padding:10px;">+ DODAJ ZDJĘCIE</button>
                </div>

                <div style="margin-top:20px; display:flex; justify-content:space-between; align-items:center;">
                    <div>
                        Kategoria: <select id="p-cat" style="padding:10px;"></select>
                        <label><input type="checkbox" id="p-main" checked> Na główną</label>
                    </div>
                    <button onclick="publishPost()" style="background:red; color:white; padding:15px 40px; font-weight:900; border:none; cursor:pointer;">PUBLIKUJ</button>
                </div>
            </div>
        </div>

        <div id="page-auth" class="page">
            <div class="admin-card" style="max-width:350px; margin:auto;">
                <h3>PANEL DOSTĘPU</h3>
                <input type="text" id="u-login" placeholder="Nick" style="width:90%; padding:10px; margin-bottom:10px;">
                <div style="position:relative;">
                    <input type="password" id="u-pass" placeholder="Hasło" style="width:90%; padding:10px;">
                    <span onclick="togglePass()" style="position:absolute; right:25px; top:12px; cursor:pointer;">👁️</span>
                </div>
                <button onclick="doLogin()" style="width:96%; margin-top:15px; background:#000; color:#fff; padding:15px;">WEJDŹ</button>
            </div>
        </div>
    </main>

    <aside id="sidebar-ext">
        </aside>
</div>

<script>
    // --- FIREBASE KONFIG (Twoje dane) ---
    const firebaseConfig = {
        apiKey: "AIzaSyCDfjooU0nPnOGePvzAk5gDziltwlqOSog",
        databaseURL: "https://grapanstwamiasta-default-rtdb.firebaseio.com",
        projectId: "grapanstwamiasta",
        storageBucket: "grapanstwamiasta.appspot.com",
        appId: "1:397606766316:web:2c038abc12914fbbe345c9"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const storage = firebase.storage();

    let user = JSON.parse(localStorage.getItem('dn_user_2.9')) || null;
    let bIdx = 0;

    // KONFIGURACJA CZCIONEK I KOLORÓW
    const FONTS = [
        {name: "Gotyk (Tradycja)", val: "'UnifrakturMaguntia', cursive"},
        {name: "Garamond (Książka)", val: "'EB Garamond', serif"},
        {name: "Slab (Gazeta)", val: "'Roboto Slab', serif"},
        {name: "Modern (Prosty)", val: "'Montserrat', sans-serif"},
        {name: "Playfair (Tytułowy)", val: "'Playfair Display', serif"}
    ];
    const COLORS = ["#000000", "#ffffff", "#ff0000", "#008000", "#0000ff", "#ffff00", "#ffa500", "#800080"];

    function addBlock(type) {
        const id = bIdx++;
        const area = document.getElementById('article-builder');
        let html = "";

        if(type === 'text') {
            let fOpts = FONTS.map(f => `<option value="${f.val}">${f.name}</option>`).join('');
            let cOpts = COLORS.map(c => `<option value="${c}" style="background:${c}; color:${c==='#ffffff'?'#000':'#fff'}">${c}</option>`).join('');
            
            html = `<div class="editor-block" id="block-${id}" data-type="text">
                <button class="btn-remove" onclick="this.parentElement.remove()">USUŃ BLOK</button>
                <div style="margin-bottom:10px;">
                    Czcionka: <select id="f-${id}">${fOpts}</select> | 
                    Litery: <select id="c-${id}">${cOpts}</select> | 
                    Tło tła: <select id="bg-${id}" style="background:#fff">${cOpts}</select>
                    <label><input type="checkbox" id="u-${id}"> Podkreślenie</label>
                </div>
                <textarea id="t-${id}" style="width:98%;" rows="6" placeholder="Wpisz treść artykułu..."></textarea>
            </div>`;
        } else {
            html = `<div class="editor-block" id="block-${id}" data-type="img">
                <button class="btn-remove" onclick="this.parentElement.remove()">USUŃ BLOK</button>
                <p>Wybierz zdjęcie:</p>
                <input type="file" id="file-${id}"> lub Link: <input type="text" id="link-${id}" placeholder="http://...">
            </div>`;
        }
        area.insertAdjacentHTML('beforeend', html);
    }

    async function publishPost() {
        const domBlocks = document.querySelectorAll('.editor-block');
        let contentArray = [];

        for(let b of domBlocks) {
            const id = b.id.split('-')[1];
            const type = b.getAttribute('data-type');
            if(type === 'text') {
                contentArray.push({
                    type: 'text',
                    val: document.getElementById(`t-${id}`).value,
                    font: document.getElementById(`f-${id}`).value,
                    color: document.getElementById(`c-${id}`).value,
                    bg: document.getElementById(`bg-${id}`).value,
                    under: document.getElementById(`u-${id}`).checked
                });
            } else {
                let url = document.getElementById(`link-${id}`).value;
                const file = document.getElementById(`file-${id}`).files[0];
                if(file) {
                    const ref = storage.ref('v9/'+Date.now()+'_'+file.name);
                    await ref.put(file);
                    url = await ref.getDownloadURL();
                }
                contentArray.push({ type: 'img', val: url });
            }
        }

        const data = {
            title: document.getElementById('p-title').value,
            sub: document.getElementById('p-sub').value,
            content: contentArray,
            cat: document.getElementById('p-cat').value,
            main: document.getElementById('p-main').checked,
            author: user ? user.nick : "Redakcja",
            ts: Date.now()
        };
        db.ref('posts_v9').push(data).then(() => location.reload());
    }

    // --- FUNKCJE POMOCNICZE (Zegar, Widok, Login) ---
    function togglePass() { const x = document.getElementById('u-pass'); x.type = x.type === "password" ? "text" : "password"; }
    
    function showPage(id, cat = "") {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        window.scrollTo(0,0);
    }

    setInterval(() => { document.getElementById('live-clock').innerText = new Date().toLocaleString(); }, 1000);
    // Na start dodajemy jeden blok tekstu
    addBlock('text');
</script>
</body>
</html>
